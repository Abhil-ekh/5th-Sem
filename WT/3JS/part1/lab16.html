<html>
<body>
    <script>
        let arr = [10, 20, 30, 40];
        document.write("Original Array: " + arr + "<br><br>");
        arr.push(50);
        document.write("After push(50): " + arr + "<br>");
        arr.pop();
        document.write("After pop(): " + arr + "<br>");
        arr.unshift(5);
        document.write("After unshift(5): " + arr + "<br>");
        arr.shift();
        document.write("After shift(): " + arr + "<br>");
        let newArr = arr.slice(1,3);
        document.write("slice(1,3): " + newArr + "<br>");
        arr.splice(2,0,25);
        document.write("After splice(2,0,25): " + arr + "<br>");
        let arr2 = [60,70];
        let combined = arr.concat(arr2);
        document.write("After concat: " + combined + "<br>");
        document.write("Index of 30: " + arr.indexOf(30) + "<br>");
        arr.reverse();
        document.write("After reverse(): " + arr + "<br>");
        arr.sort();
        document.write("After sort(): " + arr + "<br>");
    </script>
</body>
</html>
