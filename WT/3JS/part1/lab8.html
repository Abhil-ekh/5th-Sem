<html>
<head>
    <script>
    function keyDown(){
        document.getElementById("msg").innerHTML = "Key is pressed";
    }
    function keyUp(){
        document.getElementById("msg").innerHTML = "Key is released";
    }
    </script>
</head>
<body>
    <h3>Keyboard Event Demonstration</h3>
    Enter your name:
    <input type="text" onkeydown="keyDown()" onkeyup="keyUp()">
    <p id="msg"></p>
</body>
</html>
