<html>
    <body>
        <p id="para"></p>
        <script>
            var num=21;
            document.write("Value = "+num+"<br>");
            document.write("Datatype = "+typeof num+"<br>");
            var str=num.toString();
            document.write("After conversion to string = "+num+"<br>");
            document.write("Datatype = "+typeof str+"<br>");
        </script>
    </body>
</html>
