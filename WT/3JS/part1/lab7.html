<html>
<head>
    <script>
        function showClick() {
            document.getElementById("p1").innerHTML="Button Clicked";
        }

        function showHover() {
            document.getElementById("p1").innerHTML="Mouse is over the box";
        }

        function showOut() {
            document.getElementById("p1").innerHTML="Mouse moved out of the box";
        }
    </script>
</head>
<body>
    <button onclick="showClick()">Click Me</button>
    <div onmouseover="showHover()" onmouseout="showOut()" 
    style="width:150px;height:50px;background-color:lightblue;margin-top:20px;">
        Move Mouse Here
    </div>
    <p id="p1"></p>
</body>
</html>
