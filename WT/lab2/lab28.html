<html>
<head>
  <title>Z-Index Example</title>

  <style>

    .box1 {
      position: absolute;
      top: 50px;
      left: 40px;
      width: 150px;
      height: 150px;
      background-color: red;
      z-index: 1;
    }

    .box2 {
      position: absolute;
      top: 80px;
      left: 80px;
      width: 150px;
      height: 150px;
      background-color: blue;
      z-index: 2;
    }

    .box3 {
      position: absolute;
      top: 120px;
      left: 120px;
      width: 150px;
      height: 150px;
      background-color: green;
      z-index: 3;
    }
  </style>
</head>

<body>

  <h2>Overlapping Boxes using Z-Index</h2>

    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
    <div class="box3">Box 3</div>


</body>

</html>
