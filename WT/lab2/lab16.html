<html>
<head>
    <style>
        .text-style {
            color: rgb(191, 0, 255);                
            letter-spacing: 3px;            
            word-spacing: 5px;              
            text-align: center;              
            text-decoration: underline;      
            text-transform: uppercase;       
            text-shadow: 50px 50px 5px rgb(64, 1255, 0);   
            font-size: 20px;
        }
    </style>
</head>

<body>
    <p class="text-style">
        Text Styling Example
    </p>
</body>
</html>
