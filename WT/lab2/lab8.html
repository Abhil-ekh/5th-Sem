<html>
    <head>
        <style>
            p::after{
                content: " after";
                color: brown;
            }
            h5::before{
                content: "before ";
                color: brown;
            }
            h3::first-letter{
                font-style: bold;
                font-size: 30px;
                
            }
        </style>
    </head>
    <body>
        <p>Pseudo element selector example:</p>
        <h5>:Pseudo element selector example </h5>
        <h3>First-letter selector example</h3>

    </body>
</html>
